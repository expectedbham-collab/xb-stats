name: xB Stats Scraper

on:
  schedule:
    - cron: "0 8 * * 1"
    - cron: "0 8 * * 5"
  workflow_dispatch:
    inputs:
      force:
        description: 'Force snapshot even if data unchanged'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install requests playwright

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run Opta stats scraper
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scraper.py --force
          else
            python scraper.py
          fi

      - name: Run SoccerStats halftime scraper
        run: python scraper_halftime.py || echo "Halftime scraper failed - continuing"

      - name: Check if data changed
        id: changed
        run: |
          if [ -f /tmp/xb_no_change ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name  "xB Stats Bot"
          git config user.email "expectedbirmingham@gmail.com"
          git add data/history.json data/halftime.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: stats snapshot $(date -u +%Y-%m-%d)"
          git push origin HEAD:${{ github.ref_name }}
